<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araz Electron - Professional Qaimə Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

    <div class="app-container">
        
        <div class="control-panel no-print">
            <input type="text" id="customer-input" placeholder="Usta / Müştəri Adı">
            
            <div class="actions">
                <button id="btn-waiting" class="btn btn-yellow">Gözləməyə Al</button>
                <button id="btn-print" class="btn btn-blue">Çap Et</button>
                <button id="btn-download" class="btn btn-green">Yüklə (PDF)</button>
            </div>
        </div>

        <div class="main-content">
            
            <div id="printable-invoice" class="invoice-box">
                
                <div class="invoice-header">
                    <div>
                        <h1 class="brand-title">ARAZ ELECTRON</h1>
                        <p class="brand-subtitle">Elektronika və Texniki Dəstək Xidmətləri</p>
                    </div>
                    <div class="header-right">
                        <div class="document-tag">SATIŞ QAİMƏSİ</div>
                        <p class="invoice-date">Tarix: <span>30.06.2026</span></p>
                    </div>
                </div>
<div class="party-section">
    <div class="party-box"></div>
    
    <div class="party-box text-right">
        <h4>KİMƏ (MÜŞTƏRİ):</h4>
        <p class="party-name" id="customer-name-view">_______________</p>        
    </div>
</div>

                <div class="invoice-table-wrapper">
                    <table class="invoice-table">
                        <thead>
                            <tr>
                                <th class="text-center width-xs">#</th>
                                <th>Məhsulun Adı</th>
                                <th class="text-center width-sm">Miqdar</th>
                                <th class="text-right width-md">Qiymət</th>
                                <th class="text-right width-md">Cəmi</th>
                                <th class="text-center width-xs no-print">Sil</th>
                            </tr>
                        </thead>
                        <tbody id="invoice-items-body">
                            </tbody>
                    </table>
                </div>

                <button id="btn-add-item" class="btn-add no-print">+ Yeni Mal Əlavə Et</button>

                <div class="invoice-footer">
                    <div class="footer-left">
                        <div class="stamp-container">
                            <div class="stamp-box">
                                <img src="mohur.png" alt="Araz Electron Möhür" onerror="this.style.display='none';">
                            </div>
                        </div>
                    </div>
                    
                    <div class="footer-right">
                        <div class="total-amount">
                            Yekun Ödəniş: <span id="total-price-view">0.00</span> AZN
                        </div>
                    </div>
                </div>

                <div class="footer-note-wrapper">
                    <p class="footer-note">Araz Electron bizi seçdiyiniz üçün təşəkkür edirik!</p>
                </div>

            </div>

            <div class="waiting-panel no-print">
                <div class="panel-header">
                    <h3>⏳ Gözləmə Siyahısı</h3>
                    <button id="btn-refresh" class="btn-refresh">Yenilə</button>
                </div>
                <div id="waiting-list-container" class="waiting-list">
                    </div>
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
